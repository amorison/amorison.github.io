# The URL the site will be built for
base_url = "https://adrienmorison.com"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

title = "Adrien Morison's website"
theme = "even"
taxonomies = [
    {name = "categories", feed = false},
    {name = "tags", feed = false},
]

[markdown.highlighting]
error_on_missing_language = true
theme = "github-light-high-contrast"

[extra]
even_title = "Adrien's website"
even_menu = [
    {url = "$BASE_URL/publications", name = "Publications"},
    {url = "$BASE_URL/categories", name = "Categories"},
    {url = "$BASE_URL/tags", name = "Tags"},
    {url = "$BASE_URL/about", name = "About"},
]
katex_enable = true
katex_auto_render = true
